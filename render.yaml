# PokeMatrix — Render Blueprint
# Подключается автоматически после связи репозитория с Render

services:
  - type: web
    name: pokematrix
    env: node
    region: frankfurt
    plan: free
    buildCommand: npm run render-build
    startCommand: node server/dist/index.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_PASS
        value: league17admin2026
      - key: ALLOW_DEV_LOGIN
        value: true
      - key: ADMIN_IDS
        value: ""
